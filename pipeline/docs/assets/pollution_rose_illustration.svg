<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-label="Illustrative pollution rose showing dominant wind direction from S/SSW carrying high-concentration pollutant plumes.">
  <title>Illustrative pollution rose</title>
  <desc>Compass-oriented pie chart where each wedge represents a wind-direction sector. Wedge length shows how frequently wind blows from that direction; wedge color shows concentration bin (green low, yellow medium, red high). This example illustrates a Corpus Christi–style Gulf-breeze pattern with dominant winds from S/SSW.</desc>
