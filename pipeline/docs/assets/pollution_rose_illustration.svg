    .cardinal { font: bold 17px 'Segoe UI', Arial, sans-serif; fill: #1a202c; }
    .ordinal { font: 11px 'Segoe UI', Arial, sans-serif; fill: #4a5568; }
    .caption { font: 12px 'Segoe UI', Arial, sans-serif; fill: #4a5568; }
    @media (prefers-color-scheme: dark) {
      .grid-ring, .grid-line { stroke: #4a5568; }
      .cardinal { fill: #e2e8f0; }
      .ordinal, .caption { fill: #a0aec0; }
    }
  </style>
